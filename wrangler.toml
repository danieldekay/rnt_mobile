"$schema" = "./node_modules/wrangler/config-schema.json"

name = "rnt"
main = "./worker.ts"
compatibility_date = "2024-01-01"
keep_vars = true

[assets]
directory = "./build"
not_found_handling = "single-page-application"

# Public build-time vars for the SvelteKit client bundle.
# Referenced via `$env/dynamic/public` as PUBLIC_MATOMO_URL / PUBLIC_MATOMO_SITE_ID.
# These are embedded in the client JS (not secrets) — duplicating them here keeps
# CI builds self-contained without needing extra GitHub Actions inputs.
[vars]
PUBLIC_MATOMO_URL = "https://statistics.tangoparty.net"
PUBLIC_MATOMO_SITE_ID = "15"
SENDY_BASE_URL = "https://newsletter.rheinneckartango.de"
SENDY_LIST_ID = "P04CWhVSOHvpkRVhqCvYKA"
