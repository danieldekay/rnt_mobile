schema: spec-driven
context: |
  App: RNT Kalender
  Stack: SvelteKit 2, Svelte 5, TypeScript, Tailwind CSS, adapter-static
  Domain: Mobile-first PWA for Rhein-Neckar tango events
  Data source: https://www.rhein-neckar-tango.de/wp-json/tribe/events/v1
  Architecture: routes in src/routes, components in src/lib/components, API access in src/lib/api/tribe.ts, state in src/lib/stores/events.svelte.ts
  Deployment: static build for Cloudflare Pages via adapter-static
  Constraints: preserve static compatibility, keep changes mobile-first, and follow existing Svelte 5 rune patterns

# Auto-detected by spec-gen
spec-gen:
  generatedAt: "2026-05-10T00:00:00Z"
  domains:
    - api
    - routes
    - stores
    - components
    - event
    - date
    - matomo
rules:
  proposal:
    - State the user-visible outcome and the affected routes or views.
    - Note API, data-shape, or feed-availability implications.
    - Mention any prerendering or Cloudflare Pages deployment impact.
  specs:
    - Describe behavior in user-visible terms, including loading, empty, and error states when relevant.
    - Include responsive and mobile behavior for UI-facing changes.
  design:
    - Reference the concrete routes, components, store modules, and API modules that will change.
    - Prefer minimal changes consistent with the current Svelte 5 and SvelteKit structure.
    - Use #stitch if it helps, https://stitch.withgoogle.com/projects/6101620989348291389
    - German Language: Use German for user-facing text and comments, but English for code identifiers and comments when it improves clarity.
    - Work with re-usable components and patterns established in the codebase, such as the existing Svelte 5 runes and Tailwind CSS utility classes.
    - Ensure that any new components or patterns are consistent with the existing design and architecture of the app.
  tasks:
    - First write unit tests for the new behavior, then implement the changes to make the tests pass.
    - Keep tasks implementation-ready and file-scoped where possible.
    - Include validation with npm run check, and add npm run build when routing or prerender behavior changes.
